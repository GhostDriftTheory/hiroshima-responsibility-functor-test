name: Lean CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Lean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and check Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          lint: false
          use-github-cache: true
